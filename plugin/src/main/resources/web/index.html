<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCStatsBot — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@m3e/shape@1.3.1/dist/index.min.js"></script>
  <style>
    :root {
      --font: 'Google Sans', system-ui, sans-serif;
      /* Morning (default) */
      --pri: #4A8C5C; --on-pri: #FFFFFF;
      --pri-c: #C8F0D2; --on-pri-c: #1B3724;
      --sec: #4D6356; --on-sec: #FFFFFF;
      --sec-c: #D0E8D8; --on-sec-c: #1A2E22;
      --ter: #3D6373; --on-ter: #FFFFFF;
      --ter-c: #C1E8F8; --on-ter-c: #162831;
      --err: #BA1A1A; --on-err: #FFFFFF;
      --err-c: #FFDAD6; --on-err-c: #410002;
      --srf: #F8FEFB; --on-srf: #171D19;
      --srf-low: #FFFFFF; --srf-ctr: #ECF3EE;
      --srf-hi: #E0EAE3; --srf-hi2: #D5E1DA;
      --out: #6F7973; --out-v: #BFC9C1;
      --elev: #F0F7F2;
    }
    [data-theme="dawn"] {
      --pri: #9E3418; --on-pri: #FFFFFF;
      --pri-c: #FFDAD2; --on-pri-c: #410200;
      --sec: #775750; --on-sec: #FFFFFF;
      --sec-c: #FFDAD2; --on-sec-c: #2C1510;
      --ter: #715B2E; --on-ter: #FFFFFF;
      --ter-c: #FDDFA6; --on-ter-c: #261900;
      --err: #BA1A1A; --on-err: #FFFFFF;
      --err-c: #FFDAD6; --on-err-c: #410002;
      --srf: #FFF6F3; --on-srf: #221A18;
      --srf-low: #FFFFFF; --srf-ctr: #FCEAE5;
      --srf-hi: #F0DFD9; --srf-hi2: #E5D4CF;
      --out: #857370; --out-v: #D8C2BC;
      --elev: #FDF0EB;
    }
    [data-theme="afternoon"] {
      --pri: #6B4E00; --on-pri: #FFFFFF;
      --pri-c: #FFDEA0; --on-pri-c: #3A2900;
      --sec: #6B5D3F; --on-sec: #FFFFFF;
      --sec-c: #F4E0BB; --on-sec-c: #241A04;
      --ter: #4A6546; --on-ter: #FFFFFF;
      --ter-c: #CCE8C5; --on-ter-c: #082008;
      --err: #BA1A1A; --on-err: #FFFFFF;
      --err-c: #FFDAD6; --on-err-c: #410002;
      --srf: #FFFCF0; --on-srf: #1D1B12;
      --srf-low: #FFFFFF; --srf-ctr: #F2EFDF;
      --srf-hi: #E8E5D6; --srf-hi2: #DDDACC;
      --out: #6D6A5A; --out-v: #C8C5B3;
      --elev: #F5F2E5;
    }
    [data-theme="evening"] {
      --pri: #5C2E90; --on-pri: #FFFFFF;
      --pri-c: #E8D5FF; --on-pri-c: #2D0F54;
      --sec: #635B6E; --on-sec: #FFFFFF;
      --sec-c: #E9DEF5; --on-sec-c: #1F1830;
      --ter: #7E525E; --on-ter: #FFFFFF;
      --ter-c: #FFD9E2; --on-ter-c: #31101C;
      --err: #BA1A1A; --on-err: #FFFFFF;
      --err-c: #FFDAD6; --on-err-c: #410002;
      --srf: #F9F5FF; --on-srf: #1C1B1F;
      --srf-low: #FFFFFF; --srf-ctr: #F0ECF6;
      --srf-hi: #E5E1EB; --srf-hi2: #DAD6E0;
      --out: #787680; --out-v: #C9C5D0;
      --elev: #F3EFF9;
    }
    [data-theme="night"] {
      --pri: #A8D4FF; --on-pri: #003355;
      --pri-c: #1A3A55; --on-pri-c: #C8E6FF;
      --sec: #B0C8DC; --on-sec: #1A3040;
      --sec-c: #2A4050; --on-sec-c: #D0E4F4;
      --ter: #C5C0E8; --on-ter: #2D2960;
      --ter-c: #3A3670; --on-ter-c: #E5E0FF;
      --err: #FFB4AB; --on-err: #690005;
      --err-c: #93000A; --on-err-c: #FFDAD6;
      --srf: #0A1520; --on-srf: #DEE3EA;
      --srf-low: #050E18; --srf-ctr: #111D28;
      --srf-hi: #1A2833; --srf-hi2: #24333F;
      --out: #8A9198; --out-v: #40484F;
      --elev: #131F2A;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--srf); color: var(--on-srf);
      min-height: 100vh; transition: background 1s ease, color 1s ease;
      -webkit-font-smoothing: antialiased;
    }
    .mso { font-family: 'Material Symbols Outlined'; font-size: 24px; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap; direction: ltr; -webkit-font-smoothing: antialiased; }

    .shell { max-width: 600px; margin: 0 auto; padding: 24px 16px; }

    /* Top Bar */
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .top-bar h1 { font-size: 22px; font-weight: 600; }
    .top-bar-sub { font-size: 13px; opacity: .6; display: flex; align-items: center; gap: 6px; }
    .cdot { width: 8px; height: 8px; border-radius: 50%; }
    .cdot.live { background: #4CAF50; box-shadow: 0 0 6px #4CAF5088; }
    .cdot.off { background: var(--out); }
    .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: var(--on-srf); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .icon-btn:hover { background: var(--srf-hi); }

    /* Chips */
    .chip-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
    .chip-bar::-webkit-scrollbar { display: none; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 9999px; border: 1px solid var(--out-v); background: transparent; color: var(--on-srf); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .chip:hover { background: var(--srf-hi); }
    .chip.on { background: var(--sec-c); color: var(--on-sec-c); border-color: transparent; }
    .chip .mso { font-size: 18px; }

    /* Card container */
    .card { background: var(--elev); border-radius: 28px; padding: 24px; border: 1px solid var(--out-v); margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    /* === WEATHER-APP STAT CARDS (exact copy) === */
    .stat-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .wcard {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 20px; min-width: 0; flex: 1 1 140px; cursor: default;
      transition: transform 200ms ease;
    }
    .wcard:hover { transform: scale(1.02); }
    /* m3e-shape icon container — exact same as weather app WeatherCard.tsx */
    .wcard m3e-shape {
      --m3e-shape-size: 48px;
      --m3e-shape-transition: clip-path 450ms cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
    }
    .wcard m3e-shape .mso { font-size: 24px; position: relative; z-index: 1; }
    .wcard .wval { font-size: 28px; font-weight: 600; line-height: 1.1; }
    .wcard .wval small { font-size: 16px; font-weight: 400; }
    .wcard .wlbl { font-size: 12px; opacity: .8; text-align: center; }
    .wcard .wsub { font-size: 11px; opacity: .6; text-align: center; }

    /* Hero */
    .hero { border-radius: 28px; padding: 32px; margin-bottom: 16px; position: relative; overflow: hidden; }
    .hero::after { content: ''; position: absolute; top: -60px; right: -40px; width: 180px; height: 180px; background: currentColor; opacity: .06; border-radius: 50%; }
    .hero-lbl { font-size: 13px; font-weight: 500; opacity: .7; letter-spacing: .3px; margin-bottom: 8px; }
    .hero-val { font-size: 64px; font-weight: 200; letter-spacing: -3px; line-height: 1; margin-bottom: 4px; }
    .hero-unit { font-size: 20px; font-weight: 300; opacity: .7; }
    .hero-sub { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .hero-si { display: flex; align-items: center; gap: 6px; font-size: 13px; opacity: .8; }
    .hero-si .mso { font-size: 18px; }

    /* Section header */
    .shdr { display: flex; align-items: center; gap: 10px; padding: 16px 0 12px; }
    .shdr .mso { color: var(--pri); font-size: 22px; }
    .shdr span:last-child { font-size: 16px; font-weight: 500; }

    /* Leaderboard */
    .lb { background: var(--elev); border-radius: 28px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--out-v); }
    .lb-row { display: flex; align-items: center; padding: 12px 20px; gap: 12px; transition: background .1s; }
    .lb-row:hover { background: var(--srf-ctr); }
    .lb-rank { width: 28px; font-size: 14px; font-weight: 600; color: var(--pri); text-align: center; flex-shrink: 0; }
    .lb-av { width: 36px; height: 36px; border-radius: 50%; background: var(--srf-hi); overflow: hidden; flex-shrink: 0; }
    .lb-av img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-det { font-size: 12px; color: var(--out); margin-top: 1px; }
    .lb-val { font-size: 16px; font-weight: 500; flex-shrink: 0; }

    /* Bars */
    .bcard { background: var(--elev); border-radius: 28px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--out-v); }
    .brow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .blbl { width: 32px; font-size: 12px; font-weight: 500; color: var(--out); text-align: right; flex-shrink: 0; }
    .btrk { flex: 1; height: 24px; background: var(--srf-ctr); border-radius: 9999px; overflow: hidden; }
    .bfll { height: 100%; background: var(--pri); border-radius: 9999px; transition: width .6s cubic-bezier(.4,0,.2,1); min-width: 2px; }
    .bval { width: 36px; font-size: 12px; font-weight: 500; flex-shrink: 0; }

    /* Fun fact */
    .ff { border-radius: 28px; padding: 24px; margin-bottom: 16px; }
    .ff-lbl { font-size: 13px; font-weight: 600; opacity: .7; letter-spacing: .3px; margin-bottom: 8px; }
    .ff-txt { font-size: 16px; line-height: 1.5; }

    /* Events */
    .ecard { background: var(--elev); border-radius: 28px; padding: 4px 0; margin-bottom: 16px; border: 1px solid var(--out-v); }
    .erow { display: flex; align-items: center; padding: 12px 20px; gap: 12px; }
    .eico { font-size: 22px; flex-shrink: 0; }
    .etxt { flex: 1; font-size: 14px; line-height: 1.4; }
    .etm { font-size: 12px; color: var(--out); flex-shrink: 0; }

    /* Online pill */
    .opill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 14px 4px 8px; border-radius: 9999px; background: var(--pri); color: var(--on-pri); font-size: 13px; font-weight: 500; }

    /* Skeleton */
    .skel { background: linear-gradient(90deg, var(--srf-ctr) 25%, var(--srf-hi) 50%, var(--srf-ctr) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .fi { animation: fadeIn .4s cubic-bezier(.4,0,.2,1) both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* Modal */
    .mbg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
    .mbg.show { display:flex; }
    .mdl { background: var(--srf-ctr); border-radius: 28px; padding: 28px; width: min(90vw,420px); box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .mdl h3 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
    .mdl label { font-size: 13px; font-weight: 500; color: var(--out); display: block; margin-bottom: 6px; }
    .mdl input { width: 100%; padding: 10px 14px; border-radius: 16px; border: 1px solid var(--out-v); background: var(--srf-hi); color: var(--on-srf); font-family: var(--font); font-size: 14px; outline: none; margin-bottom: 16px; }
    .mdl input:focus { border-color: var(--pri); }
    .brow2 { display: flex; gap: 8px; justify-content: flex-end; }
    .btn { padding: 8px 20px; border-radius: 9999px; border: none; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn1 { background: var(--pri); color: var(--on-pri); }
    .btn2 { background: transparent; color: var(--pri); }

    @media (max-width: 480px) { .shell { padding: 16px 12px; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top-bar">
      <div style="flex:1">
        <h1>MCStatsBot</h1>
        <div class="top-bar-sub"><span class="cdot off" id="cd"></span><span id="ct">Verbinde...</span></div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()"><span class="mso" id="ti">dark_mode</span></button>
      <button class="icon-btn" onclick="loadData()"><span class="mso">refresh</span></button>
      <button class="icon-btn" onclick="showS()"><span class="mso">settings</span></button>
    </div>

    <div class="chip-bar">
      <button class="chip on" data-v="overview" onclick="sw(this)"><span class="mso">dashboard</span>Start</button>
      <button class="chip" data-v="players" onclick="sw(this)"><span class="mso">group</span>Spieler</button>
      <button class="chip" data-v="combat" onclick="sw(this)"><span class="mso">swords</span>Kampf</button>
      <button class="chip" data-v="mining" onclick="sw(this)"><span class="mso">diamond</span>Mining</button>
      <button class="chip" data-v="exploration" onclick="sw(this)"><span class="mso">explore</span>Erkunden</button>
      <button class="chip" data-v="weekly" onclick="sw(this)"><span class="mso">date_range</span>7 Tage</button>
    </div>

    <div id="C"></div>
  </div>

  <div class="mbg" id="modal" onclick="if(event.target===this)hideS()">
    <div class="mdl">
      <h3>Einstellungen</h3>
      <label>MCStatsBot API URL</label>
      <input type="text" id="api-in" placeholder="http://192.168.x.x:8080/api">
      <label style="font-size:11px;color:var(--out);margin-top:-10px;margin-bottom:12px">http://&lt;MC-Server-IP&gt;:8080/api</label>
      <div class="brow2">
        <button class="btn btn2" onclick="hideS()">Abbrechen</button>
        <button class="btn btn1" onclick="saveS()">Speichern</button>
      </div>
    </div>
  </div>

<script>
const API = localStorage.getItem('mcstats_api') || window.location.origin + '/api';
let view = 'overview', D = {};

// Theme
function gtp(){const h=new Date().getHours();if(h>=22||h<5)return 'night';if(h<8)return 'dawn';if(h<13)return null;if(h<18)return 'afternoon';return 'evening';}
function aT(){const m=localStorage.getItem('mcstats_theme'),t=m||gtp();if(t)document.documentElement.setAttribute('data-theme',t);else document.documentElement.removeAttribute('data-theme');const i=document.getElementById('ti');i.textContent=t==='night'?'light_mode':t==='evening'?'nights_stay':t==='dawn'?'wb_twilight':t==='afternoon'?'wb_sunny':'dark_mode';}
function toggleTheme(){const ts=[null,'dawn','afternoon','evening','night'],c=document.documentElement.getAttribute('data-theme'),n=ts[(ts.indexOf(c)+1)%ts.length];if(n)localStorage.setItem('mcstats_theme',n);else localStorage.removeItem('mcstats_theme');aT();}
aT();setInterval(aT,60000);

function showS(){document.getElementById('api-in').value=localStorage.getItem('mcstats_api')||'';document.getElementById('modal').classList.add('show');}
function hideS(){document.getElementById('modal').classList.remove('show');}
function saveS(){const u=document.getElementById('api-in').value.trim();if(u)localStorage.setItem('mcstats_api',u);else localStorage.removeItem('mcstats_api');hideS();location.reload();}
function sw(c){document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');view=c.dataset.v;render();}

// Utils
function fd(s){if(!s||s<=0)return '0s';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m>0?m+'m':(s%60)+'s';}
function fn(n){if(!n)return '0';return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toString();}
function fdi(b){if(!b)return '0 Bl.';return b>=1e3?(b/1e3).toFixed(1)+' km':Math.round(b)+' Bl.';}
function sk(n){return 'https://mc-heads.net/avatar/'+n+'/36';}
function md(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';}

// WeatherCard builder — exact same structure as weather app
// Uses <m3e-shape> with name + morph on hover
// WeatherCard builder — identical to weather app's WeatherCard.tsx
// Uses <m3e-shape> with name attribute, hover morphs shape
function wc(o) {
  const {icon,label,value,sub,radius='28px',bg='var(--pri-c)',fg='var(--on-pri-c)',ibg='var(--pri)',ic='var(--on-pri)',shape='circle',morph='pill'} = o;
  return `<div class="wcard" style="background:${bg};color:${fg};border-radius:${radius}"
    onmouseenter="this.querySelector('m3e-shape').setAttribute('name','${morph}')"
    onmouseleave="this.querySelector('m3e-shape').setAttribute('name','${shape}')">
    <m3e-shape name="${shape}" style="--m3e-shape-size:48px;--m3e-shape-container-color:${ibg};--m3e-shape-transition:clip-path 450ms cubic-bezier(0.34,1.56,0.64,1)">
      <span class="mso" style="color:${ic}">${icon}</span>
    </m3e-shape>
    <div class="wval">${value}</div>
    <div class="wlbl">${label}</div>
    ${sub?'<div class="wsub">'+sub+'</div>':''}
  </div>`;
}

// Data
async function loadData() {
  document.getElementById('C').innerHTML = '<div class="card"><div class="skel" style="height:120px"></div></div><div class="card"><div class="skel" style="height:200px"></div></div>';
  try {
    const r = await fetch(API+'/stats',{signal:AbortSignal.timeout(5000)});
    if(!r.ok) throw 0; D = await r.json();
    document.getElementById('cd').className='cdot live';
    document.getElementById('ct').textContent='Live';
  } catch(e) {
    D = demo();
    document.getElementById('cd').className='cdot off';
    document.getElementById('ct').textContent='Demo-Daten';
  }
  render();
}

function render() {
  if(!D.overview)return;
  const el=document.getElementById('C');
  switch(view){
    case 'overview':el.innerHTML=rOv();break;
    case 'players':el.innerHTML=rPl();break;
    case 'combat':el.innerHTML=rCo();break;
    case 'mining':el.innerHTML=rMi();break;
    case 'exploration':el.innerHTML=rEx();break;
    case 'weekly':el.innerHTML=rWk();break;
  }
  document.querySelectorAll('.fi').forEach((e,i)=>e.style.animationDelay=i*60+'ms');
}

function rOv() {
  const o=D.overview, n=D.onlinePlayers?.length||0;
  return `
    <div class="hero fi" style="background:var(--pri-c);color:var(--on-pri-c)">
      <div class="hero-lbl">ONLINE SPIELER</div>
      <div class="hero-val">${n}</div>
      <div class="hero-unit">${D.serverName||'Minecraft Server'}</div>
      <div class="hero-sub">
        <div class="hero-si"><span class="mso">group</span>${o.uniquePlayers} heute</div>
        <div class="hero-si"><span class="mso">person_add</span>${o.newPlayers} neue</div>
        <div class="hero-si"><span class="mso">chat</span>${fn(o.chatMessages)} Chat</div>
      </div>
    </div>

    <div class="card fi">
      <div class="card-title">Heutige Statistiken</div>
      <div class="stat-grid">
        ${wc({icon:'schedule',label:'Spielzeit',value:fd(o.totalPlaytimeSeconds),
          radius:'48px',bg:'var(--pri-c)',fg:'var(--on-pri-c)',ibg:'var(--pri)',ic:'var(--on-pri)',
          shape:'circle',morph:'pill'})}
        ${wc({icon:'emoji_events',label:'Spieler des Tages',value:o.playerOfDay?.name||'—',sub:o.playerOfDay?fd(o.playerOfDay.playtime)+' aktiv':'',
          radius:'48px 48px 12px 12px',bg:'var(--ter-c)',fg:'var(--on-ter-c)',ibg:'var(--ter)',ic:'var(--on-ter)',
          shape:'9-sided-cookie',morph:'12-sided-cookie'})}
        ${wc({icon:'swords',label:'Mob-Kills',value:fn(D.combat?.totalMobKills||0),sub:(D.combat?.totalDeaths||0)+' Tode',
          radius:'48px 48px 48px 8px',bg:'var(--sec-c)',fg:'var(--on-sec-c)',ibg:'var(--sec)',ic:'var(--on-sec)',
          shape:'arrow',morph:'soft-burst'})}
        ${wc({icon:'construction',label:'Bloecke',value:fn(D.mining?.totalBroken||0),sub:fn(D.mining?.totalPlaced||0)+' platziert',
          radius:'48px 8px 48px 8px',bg:'var(--pri-c)',fg:'var(--on-pri-c)',ibg:'var(--pri)',ic:'var(--on-pri)',
          shape:'pill',morph:'bun'})}
      </div>
    </div>

    ${D.onlinePlayers?.length?`
      <div class="shdr fi"><span class="mso">group</span><span>Online Spieler</span>
